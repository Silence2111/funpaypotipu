name: Deploy

# Собирает и публикует образы в GHCR по тегу vX.Y.Z, затем деплоит в Kubernetes.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Apply manifests & migrate
        run: |
          export TAG=${{ github.ref_name }}
          # подставляем тег образов и применяем
          kubectl -n gamemarket set image deployment/api      api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:$TAG
          kubectl -n gamemarket set image deployment/worker   worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:$TAG
          kubectl -n gamemarket set image deployment/web      web=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:$TAG
          # миграции — одноразовым Job
          kubectl -n gamemarket delete job migrate --ignore-not-found
          TAG=$TAG envsubst < infra/k8s/migrate-job.yaml | kubectl apply -f -
          kubectl -n gamemarket wait --for=condition=complete job/migrate --timeout=180s
          kubectl -n gamemarket rollout status deployment/api --timeout=180s
