apiVersion: v1
kind: Namespace
metadata:
  name: gamemarket
---
# Несекретная конфигурация. Хосты — managed-сервисы (RDS/ElastiCache/S3/Meili/SES).
apiVersion: v1
kind: ConfigMap
metadata:
  name: gamemarket-config
  namespace: gamemarket
data:
  NODE_ENV: "production"
  API_PORT: "4000"
  S3_ENDPOINT: "https://s3.example.com"
  S3_BUCKET: "gamemarket"
  MEILI_URL: "http://meilisearch:7700"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "true"
  SMTP_FROM: "no-reply@gamemarket.example"
  PAYMENT_PROVIDER: "mock"
  ORDER_AUTO_CONFIRM_TTL_MS: "259200000"
  ORDER_SWEEP_INTERVAL_MS: "60000"
---
# Секреты — ЗАПОЛНИТЬ реальными значениями (или через External Secrets / SealedSecrets).
apiVersion: v1
kind: Secret
metadata:
  name: gamemarket-secrets
  namespace: gamemarket
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@postgres.example:5432/gamemarket?schema=public"
  REDIS_URL: "redis://redis.example:6379"
  JWT_ACCESS_SECRET: "CHANGE_ME"
  JWT_REFRESH_SECRET: "CHANGE_ME"
  DATA_ENCRYPTION_KEY: "CHANGE_ME"
  MOCK_WEBHOOK_SECRET: "CHANGE_ME"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  MEILI_MASTER_KEY: "CHANGE_ME"
  SMTP_USER: "CHANGE_ME"
  SMTP_PASS: "CHANGE_ME"
