apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: gamemarket
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          # OWNER заменить на свой; тег выставляется деплой-воркфлоу (set image)
          image: ghcr.io/OWNER/gamemarket-api:latest
          ports: [{ containerPort: 4000 }]
          envFrom:
            - configMapRef: { name: gamemarket-config }
            - secretRef: { name: gamemarket-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 4000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: gamemarket
spec:
  selector: { app: api }
  ports: [{ port: 4000, targetPort: 4000 }]
