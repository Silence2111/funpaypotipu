apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: gamemarket
spec:
  replicas: 1
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/OWNER/gamemarket-worker:latest
          envFrom:
            - configMapRef: { name: gamemarket-config }
            - secretRef: { name: gamemarket-secrets }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
