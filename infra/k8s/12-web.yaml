apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: gamemarket
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: ghcr.io/OWNER/gamemarket-web:latest
          ports: [{ containerPort: 3000 }]
          env:
            - name: NODE_ENV
              value: "production"
            # SSR внутри кластера ходит к api по внутреннему адресу
            - name: API_URL_INTERNAL
              value: "http://api:4000"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: gamemarket
spec:
  selector: { app: web }
  ports: [{ port: 3000, targetPort: 3000 }]
