# Одноразовая миграция+сид. Применяется деплой-воркфлоу: TAG=... envsubst | kubectl apply.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: gamemarket
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/OWNER/gamemarket-api:${TAG}
          workingDir: /app
          command: ["sh", "-c", "pnpm --filter @gamemarket/db exec prisma migrate deploy && pnpm --filter @gamemarket/db seed"]
          envFrom:
            - configMapRef: { name: gamemarket-config }
            - secretRef: { name: gamemarket-secrets }
