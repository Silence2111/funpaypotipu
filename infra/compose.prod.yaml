name: gamemarket-prod

# Прод на одном VPS: образы тянутся из registry (не собираются локально).
# Запуск: IMAGE_OWNER=you IMAGE_TAG=v1.0.0 docker compose -f infra/compose.prod.yaml --env-file .env.production up -d
# Для managed-инфры вынесите postgres/redis/minio/meilisearch наружу и уберите их отсюда.

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
  MOCK_WEBHOOK_SECRET: ${MOCK_WEBHOOK_SECRET}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}
  MEILI_URL: ${MEILI_URL}
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM}
  CLAMAV_HOST: ${CLAMAV_HOST:-}

services:
  migrate:
    image: ghcr.io/${IMAGE_OWNER}/gamemarket-api:${IMAGE_TAG}
    working_dir: /app
    environment: *app-env
    command: sh -c "pnpm --filter @gamemarket/db exec prisma migrate deploy && pnpm --filter @gamemarket/db seed"
    restart: "no"

  api:
    image: ghcr.io/${IMAGE_OWNER}/gamemarket-api:${IMAGE_TAG}
    environment:
      <<: *app-env
      API_PORT: 4000
    ports: ["4000:4000"]
    depends_on: [migrate]
    restart: unless-stopped

  worker:
    image: ghcr.io/${IMAGE_OWNER}/gamemarket-worker:${IMAGE_TAG}
    environment: *app-env
    depends_on: [migrate]
    restart: unless-stopped

  web:
    image: ghcr.io/${IMAGE_OWNER}/gamemarket-web:${IMAGE_TAG}
    environment:
      NODE_ENV: production
      API_URL_INTERNAL: http://api:4000
    ports: ["3000:3000"]
    depends_on: [api]
    restart: unless-stopped
